<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>twit download</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <h1>twit / save to r2</h1>

  <label for="secret">secret</label>
  <input id="secret" type="password" placeholder="upload secret" autocomplete="current-password">

  <label for="tweetUrl">tweet url</label>
  <input id="tweetUrl" type="text" placeholder="https://x.com/user/status/...">

  <label for="name">filename <span style="color:#555">(optional, no .mp4)</span></label>
  <input id="name" type="text" placeholder="defaults to tweet id">

  <button id="btn" onclick="download()">save to r2</button>
  <div id="status"></div>

  <script src="main.js"></script>
</body>
</html>
